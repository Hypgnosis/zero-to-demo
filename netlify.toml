# ═══════════════════════════════════════════════════════════════════
# Netlify Configuration — Axiom-G Zero-Trust RAG Engine
# ═══════════════════════════════════════════════════════════════════

[build]
  command = "npm run build"
  # publish directory is automatically detected by Next.js advanced runtime

# ─── Function Configuration ──────────────────────────────────────
[functions]
  node_bundler = "esbuild"
  # Let the Next.js runtime handle routing. We do not need SPA rewrites.

# ─── Headers ─────────────────────────────────────────────────────
# Security headers for enterprise compliance.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
